<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arjosh</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/custom.css">
</head>
<body>
    <!-- Main Container -->
    <main class="min-h-screen grid grid-cols-12 bg-white mt-12">

        <!-- Left Margin -->
        <div class="col-span-2"></div>

        <!-- User Info - Aside -->
        <aside class="col-span-2 pt-10">
            
            <img 
                src="images/pfp.png" 
                alt="Profile Picture" 
                class="rounded-full w-28 h-28 object-cover"
            >

            <!-- Name -->
            <div class="flex items-center gap-2 mt-4">
                <h1 class="text-3xl font-bold">
                    Ronald Josiah Cruz
                </h1>

                <svg 
                    stroke="currentColor" 
                    fill="currentColor" 
                    stroke-width="0" 
                    viewBox="0 0 24 24" 
                    class="text-blue-400"
                    height="20" 
                    width="20" 
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <path fill="none" d="M0 0h24v24H0z"></path>
                    <path d="m23 12-2.44-2.79.34-3.69-3.61-.82-1.89-3.2L12 2.96 8.6 1.5 6.71 4.69 3.1 5.5l.34 3.7L1 12l2.44 2.79-.34 3.7 3.61.82L8.6 22.5l3.4-1.47 3.4 1.46 1.89-3.19 3.61-.82-.34-3.69L23 12zm-12.91 4.72-3.8-3.81 1.48-1.48 2.32 2.33 5.85-5.87 1.48 1.48-7.33 7.35z"></path>
                </svg>
            </div>

            <h2 class="text-lg font-light text-[#575656] mt-1">
                @Arjosh
            </h2>

            <p class="text-lg mt-2 font-light text-[#575656]">
                Web Developer
            </p>

            <!-- Status -->
            <div class="flex items-center gap-2 mt-4 flex-wrap">
                <span class="text-[#575656] font-light flex items-center border rounded-full px-4 py-1 text-sm">
                    <span class="inline-block w-3 h-3 bg-green-500 rounded-full mr-2"></span>
                    Hire me.
                </span>

                <span class="text-gray-700 text-sm">
                    • Onsite / Remote
                </span>
            </div>

            <!-- Navigation -->
            <nav class="flex flex-col gap-2 mt-6">
                
                <a href="index.html" class="bg-[#DDE3E6] px-4 py-3 rounded-xl flex items-center gap-3 transition">
                    <span><i class="fa-solid fa-house"></i></span>
                    Home
                </a>

                <a href="#" class="px-4 py-3 rounded-xl hover:bg-[#DDE3E6] flex items-center gap-3 transition">
                    <span><i class="fa-regular fa-folder-open"></i></span>
                    Projects
                </a>

                <a href="#" class="px-4 py-3 rounded-xl hover:bg-[#DDE3E6] flex items-center gap-3 transition">
                    <span><i class="fa-solid fa-briefcase"></i></span>
                    Experiences
                </a>

                <a href="#" class="px-4 py-3 rounded-xl hover:bg-[#DDE3E6] flex items-center gap-3 transition">
                    <span><i class="fa-solid fa-phone"></i></span>
                    Contact
                </a>

            </nav>

            <!-- Footer -->
            <div class="mt-auto pt-6">
                <hr class="mb-4 border-gray-300">

                <h5 class="text-center text-sm text-[#575656]">
                    COPYRIGHT @ 2026
                </h5>

                <h6 class="text-center text-sm text-[#575656]">
                    @arjosh. All rights reserved.
                </h6>
            </div>
        </aside>

        <!-- Content -->
        <section class="col-span-7 pt-10 ms-32">
            <!-- Header -->
            <header>
                <div class="flex items-center justify-between mb-6">
                    
                    <!-- Left Side -->
                    <div>
                        <h3 class="text-3xl font-semibold">Hi, I am Ronald Josiah</h3>

                        <h4 class="text-md font-light text-[#575656] flex items-center">
                            <i class="fa-solid fa-location-dot"></i>
                            <span class="ps-2">Cavite, Philippines</span>
                        </h4>
                    </div>

                    <!-- Right Side -->
                    <div class="flex items-center gap-3">
                        <!-- Toggle Switch -->
                        <label class="relative inline-flex items-end cursor-pointer">
                            <input type="checkbox" id="darkToggle" class="sr-only peer">
                            
                            <div class="w-11 h-6 bg-gray-300 rounded-full peer peer-checked:bg-gray-800 transition"></div>
                            
                            <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-all peer-checked:translate-x-5"></div>
                        </label>

                        <span class="text-sm text-gray-600">Dark</span>
                    </div>
                </div>

                <div class="">
                    <a href="#" class="bg-[#000000] text-[#FFFFFF] px-12 py-2 me-4">
                        <i class="fa-solid fa-download pe-2"></i>Download Resume
                    </a>
                    <a href="#" class="bg-[#FFFFFF] text-[#000000] px-8 py-2 shadow-md">
                        <i class="fa-solid fa-envelope pe-2"></i>Send Email
                    </a>
                </div>
            </header>
            <!-- Header -->
             
        </section>

        <!-- Right Margin -->
        <div class="col-span-1"></div>

    </main>

</body>
</html>
